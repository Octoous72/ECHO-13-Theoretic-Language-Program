# ──────────────────────────────────────────────────────────────────────────────
# publish.yml — PyPI publish via OIDC Trusted Publishing (no API token needed)
#
# Triggers ONLY when a GitHub Release is published.
# Uses PyPA's official build + publish actions with Trusted Publishing so
# no long-lived secrets are stored in the repo.
#
# ONE-TIME SETUP on pypi.org:
#   1. Go to https://pypi.org/manage/account/publishing/
#   2. Add a Pending Publisher:
#        Owner:       Octoous72
#        Repository:  ECHO-13-Theoretic-Language-Program
#        Workflow:    publish.yml
#        Environment: pypi
#   3. Create a GitHub Environment named "pypi" (optionally add required reviewers).
# ──────────────────────────────────────────────────────────────────────────────
name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing

jobs:
  # ── Job 1: Build sdist + wheel ────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: publish-pip-${{ hashFiles('**/requirements*.txt', 'pyproject.toml', 'setup.cfg') }}
          restore-keys: publish-pip-

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distribution with twine
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ── Job 2: Publish to PyPI (OIDC — no token stored) ──────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ECHO-13-Theoretic-Language-Program

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true

  # ── Job 3: TestPyPI dry-run (optional — uncomment to enable) ─────────────────
