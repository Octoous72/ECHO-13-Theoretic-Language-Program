name: ECHO-13 CI Pipeline

on:
  push:
    branches:
      - main
      - release/*

jobs:
  build-test-lint:
    name: Lint, Test, and Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v4
        with:
          auto-update-conda: true
          activate-environment: echo13
          environment-file: environment.yml
          python-version: ${{ matrix.python-version }}

      - name: Cache Conda packages
        uses: actions/cache@v4
        with:
          path: ~/.conda
          key: conda-${{ runner.os }}-${{ matrix.python-version }}
          restore-keys: |
            conda-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          # If you have requirements.txt, prefer it; otherwise remove this step.
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -U build

      - name: Run tests
        run: |
          pytest -q

      - name: Build package
        run: |
          python -m build

      - name: Upload build artifacts 
        if: github.ref == 'refs/heads/'
        uses: actions/upload-artifact@v4
        with:
          name: echo13-dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-test-lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/'

    permissions:
      contents: read
      actions: write
    

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: echo13-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v4
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
      - name: Close Stale Issues
        uses: actions/stale@v10.2.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          operations-per-run: 30
          remove-stale-when-updated: true
          exempt-issue-labels: wontfix,pinned
          exempt-pr-labels: wontfix,pinned
          close-issue-reason: completed
          delete-branch: true
          stale-issue-message: This issue is stale
          stale-pr-message: This PR is stale
          debug-only: true
          enable-statistics: true
          exempt-all-milestones: true
          exempt-draft-pr: true
          include-only-assigned: true
          ignore-updates: true
          ascending: true
          only-issue-types: issues
          labels-to-add-when-unstale: ''
          labels-to-remove-when-stale: ''
