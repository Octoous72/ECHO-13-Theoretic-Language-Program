# ──────────────────────────────────────────────────────────────────────────────
# python-package.yml — CI: multi-OS × multi-Python build + test
# Triggers on push to main / release/* and on every pull request to main.
# ──────────────────────────────────────────────────────────────────────────────
name: Python package

on:
  push:
    branches:
      - main
      - "release/*"
  pull_request:
    branches:
      - main

jobs:
  build:
    name: "Test · Python ${{ matrix.python-version }} · ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── 3. Restore / prime pip cache ─────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt', 'pyproject.toml', 'setup.cfg') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      # ── 4. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
        shell: bash

      # ── 5. Lint (fast gate — fatal errors only) ───────────────────────────────
      - name: Lint with flake8 (fatal errors)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      # ── 6. Lint (style warnings — non-blocking) ───────────────────────────────
      - name: Lint with flake8 (style warnings)
        run: |
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # ── 7. Test with pytest ───────────────────────────────────────────────────
      - name: Test with pytest
        run: |
          pytest --tb=short -q
