name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build_test_lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8 (fatal errors)
        run: flake8 --select=E9,F63,F7,F82 .

      - name: Lint with flake8 (style warnings)
        run: flake8 .

      - name: Test with pytest
        run: pytest -q

      - name: Mark stale issues and PRs
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          enable-statistics: true
          exempt-all-milestones: false
          exempt-draft-pr: false
          include-only-assigned: false
          ignore-updates: false
          ascending: false
          only-issue-types: issues
          labels-to-add-when-unstale: "active"
          labels-to-remove-when-stale: "stale"

  publish:
    needs: build_test_lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@v1.8.11
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
